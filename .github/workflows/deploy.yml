name: Deploy Environment Status Dashboard

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  NODE_VERSION: "20"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: dashboard

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run build test
        run: npm run build

      - name: Verify build artifacts exist
        run: |
          if [ ! -d "dist" ]; then
            echo "::error::Build artifacts (dist/) not found"
            exit 1
          fi
          echo "Build artifacts verified:"
          ls -la dist/

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: dashboard

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-build
          path: dashboard/dist/
          retention-days: 1
          if-no-files-found: error

  deploy:
    name: Deploy to AWS
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dashboard-build
          path: dashboard/dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Install CDK dependencies
        working-directory: infra
        run: |
          npm ci
          npx cdk --version

      - name: Deploy CDK stack
        working-directory: infra
        run: npx cdk deploy --require-approval never --outputs-file cdk-outputs.json

      - name: Output CloudFront URL
        working-directory: infra
        run: |
          if [ -f cdk-outputs.json ]; then
            echo "## Deployment Outputs" >> $GITHUB_STEP_SUMMARY
            cat cdk-outputs.json | python3 -m json.tool >> $GITHUB_STEP_SUMMARY
            echo "CDK outputs:"
            cat cdk-outputs.json
          else
            echo "No CDK outputs file found"
          fi
