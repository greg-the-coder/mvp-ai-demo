name: PR Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            dashboard/package-lock.json
            backend/package-lock.json
            infra/package-lock.json

      - name: Lint frontend
        working-directory: dashboard
        run: |
          npm ci
          npx eslint src/

      - name: Build frontend
        working-directory: dashboard
        run: npm run build

      - name: Test backend
        working-directory: backend
        run: npm test

      - name: Validate CDK
        working-directory: infra
        run: |
          npm ci
          npx tsc --noEmit
          npx cdk synth --quiet
